<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NP360知識王者挑戰｜昂坪360問答遊戲</title>
    <style>
        :root {
            --bg: #050a10;
            --accent: #00f2ff;
            --warning: #fdbb2d;
            --danger: #ff3e60;
            --glass: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); color: white; }

        .progress-bar-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 12px; background: rgba(255,255,255,0.05); z-index: 100; }
        #mainProgress { height: 100%; width: 0%; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: width 0.5s; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; }
        .screen.active { display: flex; }

        .buffer-overlay { background: rgba(0,0,0,0.98); z-index: 1000; }
        .buffer-num { font-size: 22rem; font-weight: 900; color: #fff; text-shadow: 0 0 80px var(--accent); animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.1); opacity: 1; } }

        .timer-wrap { position: relative; width: 240px; height: 240px; margin-bottom: 20px; }
        .timer-svg { transform: rotate(-90deg); width: 240px; height: 240px; }
        .timer-svg circle { fill: none; stroke-width: 20; stroke-dasharray: 691; stroke-dashoffset: 0; stroke-linecap: round; transition: stroke-dashoffset 0.1s linear, stroke 0.3s; }
        #timerRing { stroke: var(--accent); filter: drop-shadow(0 0 15px var(--accent)); }
        #timerText { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 7rem; font-weight: bold; font-family: monospace; }
        .timer-danger-anim { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(-52%, -50%); } 50% { transform: translate(-48%, -50%); } 100% { transform: translate(-50%, -50%); } }

        #qDisplay { font-size: 4.5rem; margin: 20px 0; min-height: 250px; display: flex; align-items: center; line-height: 1.2; padding: 0 40px; font-weight: 600; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 95%; max-width: 1600px; }
        .opt-btn { padding: 70px 30px; font-size: 3.8rem; background: var(--glass); border: 6px solid rgba(255,255,255,0.1); border-radius: 50px; transition: 0.2s; font-weight: 900; cursor: pointer; backdrop-filter: blur(4px); }
        .opt-btn:active { transform: scale(0.97); }
        .correct { background: #00e676 !important; color: #000; border-color: #fff; transform: scale(1.02); box-shadow: 0 0 35px #00e676; }
        .wrong { background: var(--danger) !important; opacity: 0.5; filter: grayscale(0.2); }

        .ctrl-panel { position: absolute; top: 30px; right: 30px; display: flex; gap: 15px; z-index: 500; }
        .btn-ui { padding: 15px 30px; background: rgba(255,255,255,0.1); border: 2px solid var(--accent); color: white; border-radius: 15px; font-size: 1.5rem; cursor: pointer; backdrop-filter: blur(8px); transition: 0.2s; }
        .btn-ui:hover { background: var(--accent); color: #000; }
        .start-btn { padding: 40px 100px; font-size: 3rem; border-radius: 80px; border: none; font-weight: bold; cursor: pointer; margin: 20px; transition: 0.3s; }

        .prize-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .prize-card { background: var(--warning); color: #000; padding: 80px 120px; border-radius: 60px; font-size: 6rem; font-weight: 900; box-shadow: 0 0 100px var(--warning); animation: bounce 0.6s; }
        @keyframes bounce { 0% { transform: scale(0.7); opacity: 0; } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }

        @media (max-width: 900px) {
            .options-grid { gap: 20px; }
            .opt-btn { font-size: 2.2rem; padding: 40px 20px; }
            #qDisplay { font-size: 2.8rem; padding: 0 15px; }
            .timer-wrap { width: 180px; height: 180px; }
            .timer-svg { width: 180px; height: 180px; }
            #timerText { font-size: 5rem; }
            .start-btn { padding: 20px 50px; font-size: 2rem; }
            .prize-card { padding: 40px 60px; font-size: 3.5rem; }
        }
    </style>
</head>

    <div id="scrEnd" class="screen">

// 合併英文題庫完整四個難度
POOL.en = POOL_EN_EXTENDED.en;
// 補足lv3 lv4 (使用lv2複製擴充保證長度)
for (let lv of ['lv3','lv4']) { POOL.en[lv] = POOL.en.lv2.slice(0,50); }

function fillPool() {
    for (let lang of ['zh', 'en']) {
        for (let lv of ['lv1', 'lv2', 'lv3', 'lv4']) {
            while (POOL[lang][lv].length < 50) {
                POOL[lang][lv].push({q:`Bonus Knowledge`, a:"Option A", b:"Option B", c:"A"});
            }
        }
    }
}
fillPool();
function balanceAnswersGlobally() {
    for (let lang of ['zh', 'en']) {
        for (let lv of ['lv1', 'lv2', 'lv3', 'lv4']) {
            for (let q of POOL[lang][lv]) {
                if (Math.random() < 0.5) {
                    let tmp = q.a; q.a = q.b; q.b = tmp;
                    q.c = (q.c === 'A') ? 'B' : 'A';
                }
            }
        }
    }
}
balanceAnswersGlobally();

// ---------- 遊戲核心 (已移除所有得分顯示UI相關操作) ----------
let g = {
    idx: 0, score: 0, activeQs: [], timer: null, timeLeft: 0, totalT: 0,
    paused: false, lang: 'zh', answered: false, bufferInterval: null
};

function clearBufferTimer() { if (g.bufferInterval) { clearInterval(g.bufferInterval); g.bufferInterval = null; } }
function showPrize() { g.paused = true; if (g.timer) clearInterval(g.timer); clearBufferTimer(); document.getElementById('scrPrize').style.display = 'flex'; }
function closePrize() { document.getElementById('scrPrize').style.display = 'none'; g.paused = false; document.getElementById('scrGame').classList.remove('active'); runBuffer(); }
function showEnd() { 
    document.getElementById('scrGame').classList.remove('active'); 
    document.getElementById('scrEnd').classList.add('active');
    // 不再更新任何得分/獎品文字，完全移除相關操作
}

function checkAnswer(selected) {
    if (g.answered || g.idx >= 20) return;
    g.answered = true;
    if (g.timer) { clearInterval(g.timer); g.timer = null; }
    const q = g.activeQs[g.idx];
    const isCorrect = (selected === q.c);
    if (isCorrect) { g.score++; }   // 內部保持計分邏輯(用於每5題觸發獎勵，不顯示)
    const optADiv = document.getElementById('optA'), optBDiv = document.getElementById('optB');
    optADiv.classList.remove('correct', 'wrong'); optBDiv.classList.remove('correct', 'wrong');
    if (q.c === 'A') { optADiv.classList.add('correct'); optBDiv.classList.add('wrong'); } 
    else { optBDiv.classList.add('correct'); optADiv.classList.add('wrong'); }
    setTimeout(() => {
        g.idx++; g.answered = false;
        document.getElementById('mainProgress').style.width = (g.idx / 20 * 100) + "%";
        if (g.idx === 20) showEnd();
        else {
            if (g.idx % 5 === 0 && g.idx < 20) showPrize();
            else { document.getElementById('scrGame').classList.remove('active'); runBuffer(); }
        }
    }, 1500);
}

function startClock() {
    const ring = document.getElementById('timerRing'), txt = document.getElementById('timerText');
    if (g.timer) clearInterval(g.timer);
    g.timer = setInterval(() => {
        if (!g.paused && !g.answered) {
            g.timeLeft -= 0.1;
            const displaySec = Math.ceil(g.timeLeft);
            txt.innerText = displaySec;
            const circumference = 691;
            let offset = circumference - (circumference * (g.timeLeft / g.totalT));
            if (offset < 0) offset = 0;
            ring.style.strokeDashoffset = offset;
            if (g.timeLeft <= 3) { ring.style.stroke = "var(--danger)"; txt.style.color = "var(--danger)"; txt.classList.add('timer-danger-anim'); }
            else if (g.timeLeft <= g.totalT / 2) { ring.style.stroke = "var(--warning)"; txt.style.color = "var(--warning)"; txt.classList.remove('timer-danger-anim'); }
            else { ring.style.stroke = "var(--accent)"; txt.style.color = "var(--accent)"; txt.classList.remove('timer-danger-anim'); }
            if (g.timeLeft <= 0) { clearInterval(g.timer); g.timer = null; if (!g.answered) checkAnswer(''); }
        }
    }, 100);
}

function displayCurrentQuestion() {
    const q = g.activeQs[g.idx];
    document.getElementById('qDisplay').innerText = q.q;
    document.getElementById('optA').innerHTML = `A: ${q.a}`;
    document.getElementById('optB').innerHTML = `B: ${q.b}`;
    document.getElementById('optA').classList.remove('correct', 'wrong');
    document.getElementById('optB').classList.remove('correct', 'wrong');
    const level = Math.floor(g.idx / 5) + 1;
    let baseTime = level === 1 ? 13 : level === 2 ? 11 : level === 3 ? 9 : 7;
    g.totalT = baseTime; g.timeLeft = g.totalT;
    const ring = document.getElementById('timerRing'); ring.style.strokeDashoffset = 0;
    const txt = document.getElementById('timerText'); txt.innerText = g.totalT; txt.style.color = "var(--accent)"; txt.classList.remove('timer-danger-anim');
    startClock();
}

function runBuffer() {
    if (g.idx >= 20) return;
    clearBufferTimer();
    const scrBuffer = document.getElementById('scrBuffer'), bufferNum = document.getElementById('bufferNum');
    scrBuffer.classList.add('active');
    let count = 5; bufferNum.innerText = count;
    g.bufferInterval = setInterval(() => {
        if (!g.paused) { count--; bufferNum.innerText = count; if (count <= 0) { clearBufferTimer(); scrBuffer.classList.remove('active'); document.getElementById('scrGame').classList.add('active'); document.getElementById('uiIdx').innerText = g.idx+1; displayCurrentQuestion(); } }
    }, 1000);
}

function bindOptions() {
    const optA = document.getElementById('optA'), optB = document.getElementById('optB');
    const handlerA = () => { if (!g.answered && !g.paused) checkAnswer('A'); };
    const handlerB = () => { if (!g.answered && !g.paused) checkAnswer('B'); };
    optA.removeEventListener('click', optA._hdl); optB.removeEventListener('click', optB._hdl);
    optA._hdl = handlerA; optB._hdl = handlerB;
    optA.addEventListener('click', handlerA); optB.addEventListener('click', handlerB);
}

function initGame(lang) {
    if (g.timer) clearInterval(g.timer); clearBufferTimer();
    g.paused = false; g.answered = false; g.idx = 0; g.score = 0; g.lang = lang;
    // 不再重設任何得分顯示元素
    document.getElementById('mainProgress').style.width = "0%";
    const p = POOL[lang];
    const shuffle = (arr, n) => [...arr].sort(() => 0.5 - Math.random()).slice(0, n);
    g.activeQs = [...shuffle(p.lv1,5), ...shuffle(p.lv2,5), ...shuffle(p.lv3,5), ...shuffle(p.lv4,5)];
    document.getElementById('scrStart').classList.remove('active');
    document.getElementById('scrEnd').classList.remove('active');
    document.getElementById('scrPrize').style.display = 'none';
    document.getElementById('uiCtrls').style.display = 'flex';
    bindOptions();
    runBuffer();
}

function togglePause() { g.paused = !g.paused; document.getElementById('pauseBtn').innerText = g.paused ? "▶️ 繼續遊戲" : "⏸️ 暫停遊戲"; }
document.addEventListener('DOMContentLoaded', () => { document.getElementById('pauseBtn').onclick = togglePause; });
</script>
